<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Shop Manager — Setup Workflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FAF9F4;
  --surface: #FFFFFF;
  --surface-soft: #F5F4EE;
  --ink: #1F2A44;
  --ink-soft: #5B6175;
  --ink-mute: #8A8E9C;
  --line: #E8E5DD;
  --line-soft: #F0EEE7;
  --brand: #534AB7;
  --brand-dark: #3C3489;
  --brand-light: #EEEDFE;
  --success: #0F6E56;
  --success-light: #E1F5EE;
  --shadow-sm: 0 1px 2px rgba(31,42,68,0.04);
  --shadow: 0 4px 16px rgba(31,42,68,0.06);
  --shadow-lg: 0 20px 60px rgba(31,42,68,0.18);
}
body {
  font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.icon {
  width: 1em;
  height: 1em;
  display: inline-block;
  vertical-align: -0.15em;
  flex-shrink: 0;
}
.icon path, .icon line, .icon polyline, .icon polygon, .icon circle, .icon ellipse, .icon rect {
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

button {
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: var(--surface);
  border: 1px solid var(--line);
  padding: 8px 14px;
  border-radius: 8px;
  color: var(--ink);
  transition: background 0.12s, border-color 0.12s, transform 0.08s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
button:hover { background: var(--surface-soft); border-color: #D6D2C8; }
button:active { transform: scale(0.97); }
button.primary { background: var(--brand); color: white; border-color: var(--brand); }
button.primary:hover { background: var(--brand-dark); border-color: var(--brand-dark); }
button.success { background: var(--success); color: white; border-color: var(--success); }
button.success:hover { background: #0A5643; }
button.subtle { background: transparent; border: none; padding: 6px 8px; color: var(--ink-mute); }
button.subtle:hover { color: var(--ink); background: var(--line-soft); }
button.danger { color: #991B1B; border-color: #FECACA; background: #FFF5F5; }
button.danger:hover { background: #FEE2E2; }
button.ghost { background: transparent; border-color: transparent; color: var(--ink-soft); }
button.ghost:hover { background: var(--line-soft); color: var(--ink); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

input[type="text"], textarea, select {
  font-family: inherit;
  font-size: 14px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  width: 100%;
  color: var(--ink);
  font-weight: 500;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(83,74,183,0.1);
}
textarea { min-height: 70px; resize: vertical; font-family: inherit; font-weight: 400; }
.mono { font-family: 'JetBrains Mono', monospace; }

.app { max-width: 1000px; margin: 0 auto; padding: 24px 24px 80px; }

.app-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; padding-bottom: 18px; border-bottom: 1px solid var(--line);
  flex-wrap: wrap; gap: 12px;
}
.brand-row { display: flex; align-items: center; gap: 12px; }
.brand-icon {
  width: 40px; height: 40px; background: var(--brand-light); color: var(--brand-dark);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.brand-text { display: flex; flex-direction: column; }
.brand-title { font-size: 17px; font-weight: 800; letter-spacing: -0.01em; line-height: 1.2; }
.brand-sub { font-size: 12px; color: var(--ink-mute); font-weight: 500; }
.header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.storage-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 999px; background: var(--surface-soft); color: var(--ink-soft);
  margin-bottom: 16px; border: 1px solid var(--line-soft);
}
.storage-badge.warn { background: #FAEEDA; color: #633806; border-color: #EF9F27; }
.storage-badge .icon { font-size: 12px; }

.live-banner {
  background: var(--success-light); border: 1px solid var(--success);
  padding: 12px 16px; border-radius: 10px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px; animation: pulse-border 2s ease-in-out infinite;
}
@keyframes pulse-border { 0%, 100% { border-color: var(--success); } 50% { border-color: #5DCAA5; } }
.live-banner .icon { font-size: 18px; color: var(--success); }
.live-banner-text { flex: 1; }
.live-banner-title { font-size: 13px; font-weight: 700; color: var(--success); margin-bottom: 2px; }
.live-banner-sub { font-size: 12px; color: #085041; }
.live-banner-actions { display: flex; gap: 6px; }

.watch-banner {
  background: #E6F1FB; border: 1px solid #85B7EB;
  padding: 14px 18px; border-radius: 10px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.watch-banner .icon { font-size: 20px; color: #185FA5; }
.watch-banner-text { flex: 1; }
.watch-banner-title { font-size: 14px; font-weight: 700; color: #042C53; margin-bottom: 3px; }
.watch-banner-sub { font-size: 12px; color: #0C447C; }

.client-bar {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}
.client-bar-label { font-size: 11px; color: var(--ink-mute); font-weight: 700; letter-spacing: 0.6px; }
.client-bar select { width: auto; flex: 1; max-width: 320px; font-weight: 600; }
.client-bar-actions { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }

.workflow {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 28px; box-shadow: var(--shadow-sm);
}

.progress-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 12px; color: var(--ink-mute); margin-bottom: 8px; font-weight: 600;
}
.progress-row .progress-text-main { color: var(--ink); font-size: 13px; }
.progress-bar { height: 8px; background: var(--line-soft); border-radius: 999px; overflow: hidden; margin-bottom: 24px; }
.progress-fill { height: 100%; background: var(--brand); transition: width 0.4s ease; border-radius: 999px; }

.flash {
  display: flex; gap: 12px; padding: 14px 16px; border-radius: 10px;
  background: #FAEEDA; border: 1px solid #EF9F27; color: #633806;
  margin-bottom: 20px; align-items: flex-start;
}
.flash > .icon { font-size: 20px; flex-shrink: 0; color: #BA7517; margin-top: 1px; }
.flash-content { flex: 1; font-size: 13px; line-height: 1.5; }
.flash-content strong { font-weight: 700; }
.flash-close { background: transparent; border: none; color: #854F0B; padding: 2px; cursor: pointer; display: flex; }

.next-card {
  padding: 24px 26px; border-radius: 14px; border: 1px solid;
  margin-bottom: 28px;
}
.next-card.phase-1 { background: #EEEDFE; border-color: #AFA9EC; }
.next-card.phase-2 { background: #E1F5EE; border-color: #5DCAA5; }
.next-card.phase-3 { background: #FAECE7; border-color: #F0997B; }
.next-card.phase-4 { background: #FBEAF0; border-color: #ED93B1; }
.next-card.phase-5 { background: #E6F1FB; border-color: #85B7EB; }
.next-card.phase-6 { background: #FAEEDA; border-color: #EF9F27; }
.next-card.in-progress { background: #FAEEDA; border-color: #EF9F27; }
.next-card.blocked { background: #FCEBEB; border-color: #E24B4A; }

.next-label {
  font-size: 11px; font-weight: 800; letter-spacing: 1px;
  margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
}
.phase-1 .next-label { color: #26215C; }
.phase-2 .next-label { color: #04342C; }
.phase-3 .next-label { color: #4A1B0C; }
.phase-4 .next-label { color: #4B1528; }
.phase-5 .next-label { color: #042C53; }
.phase-6 .next-label, .in-progress .next-label { color: #412402; }
.blocked .next-label { color: #501313; }

.status-inline {
  padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 700;
  margin-left: 8px; letter-spacing: 0.2px;
}

.next-step-id { font-size: 12px; color: var(--ink-mute); font-weight: 600; margin-bottom: 4px; letter-spacing: 0.2px; }
.next-task {
  font-size: 19px; font-weight: 700; color: var(--ink);
  margin-bottom: 18px; line-height: 1.35; letter-spacing: -0.01em;
}
.button-row { display: flex; flex-wrap: wrap; gap: 8px; }
.button-row button {
  font-size: 14px; padding: 9px 18px; font-weight: 600;
  background: rgba(255,255,255,0.7);
}
.button-row button:hover { background: white; }

.banner-inline {
  margin-top: 16px; padding: 12px 14px; background: rgba(255,255,255,0.6);
  border-radius: 8px; font-size: 13px; display: flex; align-items: flex-start; gap: 10px;
}
.banner-inline > .icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.banner-inline strong { font-weight: 700; }

.section-title {
  font-size: 11px; font-weight: 800; color: var(--ink-mute);
  letter-spacing: 1.2px; margin: 28px 0 12px; display: flex; align-items: center; gap: 8px;
}
.section-title .count {
  background: var(--surface-soft); color: var(--ink-soft);
  padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 700;
}

.completed-list { display: flex; flex-direction: column; gap: 8px; }
.completed-row {
  background: var(--surface-soft); border: 1px solid var(--line-soft);
  border-radius: 10px; padding: 12px 14px; transition: border-color 0.15s;
}
.completed-row:hover { border-color: var(--line); }
.completed-row.has-note { background: #FFFEF7; border-color: #F0E6B8; }
.completed-row-main { display: flex; align-items: center; gap: 12px; }
.phase-tag {
  width: 4px; height: 26px; border-radius: 2px; flex-shrink: 0;
}
.phase-tag.phase-1 { background: #534AB7; }
.phase-tag.phase-2 { background: #0F6E56; }
.phase-tag.phase-3 { background: #993C1D; }
.phase-tag.phase-4 { background: #993556; }
.phase-tag.phase-5 { background: #185FA5; }
.phase-tag.phase-6 { background: #854F0B; }
.step-id { font-size: 12px; color: var(--ink-mute); min-width: 38px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.step-text { flex: 1; font-size: 13px; color: var(--ink); font-weight: 500; }
.step-ts { font-size: 11px; color: var(--ink-mute); white-space: nowrap; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

.pill { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; white-space: nowrap; letter-spacing: 0.2px; }
.pill-done, .pill-yes { background: #97C459; color: #173404; }
.pill-no { background: #F0997B; color: #4A1B0C; }
.pill-progress { background: #FAC775; color: #412402; }
.pill-blocked { background: #F09595; color: #501313; }
.pill-na { background: #D3D1C7; color: #2C2C2A; }
.pill-method { background: #85B7EB; color: #042C53; }

.row-actions { display: flex; gap: 2px; align-items: center; margin-left: 4px; }
.icon-btn {
  background: transparent; border: none; color: var(--ink-mute);
  padding: 6px; border-radius: 6px; font-size: 16px; cursor: pointer;
  width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center;
}
.icon-btn:hover { color: var(--ink); background: var(--line-soft); }
.icon-btn.active { color: var(--brand); background: var(--brand-light); }

.note-area { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); }
.note-display {
  font-size: 13px; color: var(--ink-soft); line-height: 1.55; white-space: pre-wrap;
  display: flex; gap: 8px; align-items: flex-start;
}
.note-display > .icon { color: #BA7517; flex-shrink: 0; margin-top: 3px; font-size: 14px; }
.note-editor { display: flex; flex-direction: column; gap: 8px; }
.note-actions { display: flex; gap: 6px; justify-content: flex-end; }

.phase-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
.phase-card { background: var(--surface-soft); border-radius: 10px; padding: 14px 16px; transition: transform 0.12s; }
.phase-card.phase-1 { background: #EEEDFE; }
.phase-card.phase-2 { background: #E1F5EE; }
.phase-card.phase-3 { background: #FAECE7; }
.phase-card.phase-4 { background: #FBEAF0; }
.phase-card.phase-5 { background: #E6F1FB; }
.phase-card.phase-6 { background: #FAEEDA; }
.phase-card.locked { background: var(--surface-soft); opacity: 0.55; }
.phase-card-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; font-size: 12px; font-weight: 700;
}
.phase-card-head .icon { font-size: 16px; }
.phase-1 .phase-card-head { color: #3C3489; }
.phase-2 .phase-card-head { color: #085041; }
.phase-3 .phase-card-head { color: #712B13; }
.phase-4 .phase-card-head { color: #72243E; }
.phase-5 .phase-card-head { color: #0C447C; }
.phase-6 .phase-card-head { color: #633806; }
.locked .phase-card-head { color: var(--ink-mute); }
.phase-card-pct { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
.phase-card-count { font-size: 11px; color: var(--ink-mute); margin-top: 4px; font-weight: 600; }
.phase-card-bar { height: 4px; background: rgba(0,0,0,0.08); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.phase-card-bar-fill { height: 100%; transition: width 0.4s; }
.phase-1 .phase-card-bar-fill { background: #534AB7; }
.phase-2 .phase-card-bar-fill { background: #0F6E56; }
.phase-3 .phase-card-bar-fill { background: #993C1D; }
.phase-4 .phase-card-bar-fill { background: #993556; }
.phase-5 .phase-card-bar-fill { background: #185FA5; }
.phase-6 .phase-card-bar-fill { background: #854F0B; }

.complete-card {
  background: linear-gradient(180deg, #DCEFC5 0%, #C0DD97 100%);
  border: 1px solid #639922; border-radius: 14px;
  padding: 32px; text-align: center; margin-bottom: 24px;
}
.complete-icon { font-size: 48px; color: #173404; margin-bottom: 12px; display: inline-flex; }
.complete-title { font-size: 22px; font-weight: 800; color: #173404; letter-spacing: -0.01em; }
.complete-sub { font-size: 14px; color: #27500A; margin-top: 6px; font-weight: 500; }

.welcome {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 80px 32px; text-align: center;
  box-shadow: var(--shadow-sm);
}
.welcome-icon-wrap {
  width: 80px; height: 80px; background: var(--brand-light); color: var(--brand-dark);
  border-radius: 20px; display: inline-flex; align-items: center; justify-content: center;
  font-size: 40px; margin-bottom: 20px;
}
.welcome-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; }
.welcome-sub {
  color: var(--ink-soft); margin: 0 auto 28px; max-width: 480px; font-size: 15px;
}
.welcome-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

.manage-view {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 28px; box-shadow: var(--shadow-sm);
}
.manage-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 10px; }
.manage-title { font-size: 20px; font-weight: 800; letter-spacing: -0.01em; }
.manage-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.backup-row {
  display: flex; gap: 12px; padding: 14px 16px;
  background: var(--brand-light); border: 1px solid #AFA9EC;
  border-radius: 10px; margin-bottom: 20px; align-items: center;
  flex-wrap: wrap;
}
.backup-row > .icon { font-size: 22px; color: var(--brand-dark); flex-shrink: 0; }
.backup-info { flex: 1; min-width: 200px; }
.backup-title { font-size: 13px; font-weight: 700; color: var(--brand-dark); margin-bottom: 2px; }
.backup-sub { font-size: 12px; color: #4A4582; }
.backup-actions { display: flex; gap: 6px; flex-wrap: wrap; }

.client-list { display: flex; flex-direction: column; gap: 10px; }
.client-item {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 18px; border: 1px solid var(--line);
  border-radius: 12px; background: var(--surface);
  transition: border-color 0.15s, transform 0.12s;
  flex-wrap: wrap;
}
.client-item:hover { border-color: #D0CCC0; }
.client-item-info { flex: 1; min-width: 200px; }
.client-item-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.01em; }
.client-item-meta {
  font-size: 12px; color: var(--ink-mute); font-weight: 500;
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
}
.client-item-actions { display: flex; gap: 6px; flex-wrap: wrap; }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(31,42,68,0.5);
  display: flex; align-items: center; justify-content: center; z-index: 100;
  backdrop-filter: blur(4px); padding: 16px;
}
.modal {
  background: var(--surface); border-radius: 14px; padding: 28px;
  width: 100%; max-width: 520px; box-shadow: var(--shadow-lg);
  max-height: 90vh; overflow-y: auto;
}
.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.01em; }
.modal-sub { color: var(--ink-soft); margin-bottom: 18px; font-size: 14px; line-height: 1.5; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 22px; flex-wrap: wrap; }
.modal-field { margin-bottom: 16px; }
.modal-field label { display: block; font-size: 12px; font-weight: 700; color: var(--ink); margin-bottom: 6px; letter-spacing: 0.3px; }
.modal-code {
  background: var(--surface-soft); border: 1px solid var(--line);
  padding: 12px; border-radius: 8px; font-family: 'JetBrains Mono', monospace;
  font-size: 13px; word-break: break-all; user-select: all; cursor: pointer;
  position: relative;
}
.modal-code:hover { background: #EEEDEE; }
.modal-steps { padding-left: 20px; margin: 14px 0; }
.modal-steps li { margin-bottom: 8px; font-size: 13px; line-height: 1.55; }
.modal-steps li strong { font-weight: 600; }

.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: white; padding: 11px 20px; border-radius: 999px;
  font-size: 13px; font-weight: 600; box-shadow: var(--shadow-lg); z-index: 200;
  display: flex; align-items: center; gap: 8px;
  animation: toast-in 0.22s ease;
  max-width: calc(100% - 32px);
}
.toast > .icon { font-size: 14px; }
@keyframes toast-in { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }

.loading-state {
  display: flex; align-items: center; justify-content: center;
  min-height: 60vh; flex-direction: column; gap: 14px; color: var(--ink-mute);
}
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--line);
  border-top-color: var(--brand); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state { text-align: center; padding: 40px 20px; color: var(--ink-mute); font-size: 14px; }

@media (max-width: 640px) {
  .app { padding: 16px 14px 60px; }
  .workflow, .manage-view { padding: 18px; }
  .client-bar { flex-wrap: wrap; }
  .client-bar select { max-width: 100%; flex-basis: 100%; }
  .client-bar-actions { margin-left: 0; }
  .next-task { font-size: 17px; }
  .step-ts { display: none; }
}
</style>
</head>
<body>
<div id="root"><div class="app"><div class="loading-state"><div class="spinner"></div><div>Loading…</div></div></div></div>
<input type="file" id="import-file-input" accept=".json,application/json" style="display:none">

<script>
// ==============================================================
// INLINE SVG ICONS
// ==============================================================
const ICONS = {

// ==============================================================
// STORAGE LAYER
// ==============================================================
const HAS_CLAUDE = typeof window.storage !== 'undefined';
const HAS_LOCAL = (() => {
  try { const k = '__tts_test__'; localStorage.setItem(k, '1'); localStorage.removeItem(k); return true; }
  catch (e) { return false; }
})();
const STORAGE_MODE = HAS_CLAUDE ? 'claude' : (HAS_LOCAL ? 'local' : 'memory');

const KEY_INDEX = 'tts:index';
const KEY_JSONBIN_KEY = 'tts:jsonbin_key';
const KEY_LIVE_BIN_ID = 'tts:live_bin_id'; // NEW: persist Bin ID across sessions
const keyClient = (id) => `tts:client:${id}`;
let memoryStore = {};

async function storageGet(key) {
  if (STORAGE_MODE === 'claude') {
    try { const r = await window.storage.get(key); return r ? r.value : null; }
    catch (e) { return null; }
  }
  if (STORAGE_MODE === 'local') { try { return localStorage.getItem(key); } catch (e) { return null; } }
  return memoryStore[key] !== undefined ? memoryStore[key] : null;
}
async function storageSet(key, value) {
  if (STORAGE_MODE === 'claude') {
    try { await window.storage.set(key, value); return true; } catch (e) { return false; }
  }
  if (STORAGE_MODE === 'local') { try { localStorage.setItem(key, value); return true; } catch (e) { return false; } }
  memoryStore[key] = value;
  return true;
}
async function storageDelete(key) {
  if (STORAGE_MODE === 'claude') {
    try { await window.storage.delete(key); return true; } catch (e) { return false; }
  }
  if (STORAGE_MODE === 'local') { try { localStorage.removeItem(key); return true; } catch (e) { return false; } }
  delete memoryStore[key];
  return true;
}

async function loadIndex() {
  const raw = await storageGet(KEY_INDEX);
  if (!raw) return [];
  try { return JSON.parse(raw); } catch (e) { return []; }
}
async function saveIndex(list) { return storageSet(KEY_INDEX, JSON.stringify(list)); }
async function loadClient(id) {
  const raw = await storageGet(keyClient(id));
  if (!raw) return null;
  try { return JSON.parse(raw); } catch (e) { return null; }
}
async function saveClient(client) { return storageSet(keyClient(client.id), JSON.stringify(client)); }
async function deleteClientFromStorage(id) { return storageDelete(keyClient(id)); }

async function getJsonBinKey() { return storageGet(KEY_JSONBIN_KEY); }
async function setJsonBinKey(key) { return storageSet(KEY_JSONBIN_KEY, key); }
async function getSavedBinId() { return storageGet(KEY_LIVE_BIN_ID); }
async function saveBinId(binId) { return storageSet(KEY_LIVE_BIN_ID, binId); }
async function clearBinId() { return storageDelete(KEY_LIVE_BIN_ID); }

// ==============================================================
// LIVE SHARE — JSONBin.io integration with persistent Bin ID
// ==============================================================
async function startLiveShare() {
  const apiKey = await getJsonBinKey();
  if (!apiKey) {
    state.modal = { type: 'setup-jsonbin' };
    render();
    return;
  }
  if (!state.current) return;

  // Check for existing saved Bin ID
  const savedBinId = await getSavedBinId();
  
  try {
    let binId;
    
    if (savedBinId) {
      // RESUME existing session — reuse same Bin ID
      binId = savedBinId;
      // Update the bin with latest data
      const payload = {
        clientName: state.current.name,
        clientId: state.current.id,
        updatedAt: new Date().toISOString(),
        data: state.current
      };
      await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
        body: JSON.stringify(payload)
      });
      showToast('Live Share resumed with existing link', 2200);
    } else {
      // CREATE new Bin ID
      const payload = {
        clientName: state.current.name,
        clientId: state.current.id,
        updatedAt: new Date().toISOString(),
        data: state.current
      };
      const res = await fetch('https://api.jsonbin.io/v3/b', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      binId = json.metadata.id;
      
      // Save Bin ID for future sessions
      await saveBinId(binId);
    }

    const shareUrl = window.location.origin + window.location.pathname + '?watch=' + binId;
    state.liveShare.active = true;
    state.liveShare.binId = binId;
    state.liveShare.shareUrl = shareUrl;

    // Start auto-sync every 5 seconds
    state.liveShare.syncInterval = setInterval(async () => {
      if (!state.liveShare.active || !state.current) return;
      const payload = {
        clientName: state.current.name,
        clientId: state.current.id,
        updatedAt: new Date().toISOString(),
        data: state.current
      };
      try {
        await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
          body: JSON.stringify(payload)
        });
      } catch (e) { console.error('Sync failed:', e); }
    }, 5000);

    if (!savedBinId) {
      // Only show modal if this is a NEW bin (first time sharing)
      state.modal = { type: 'share-link', payload: shareUrl };
    }
    render();
  } catch (e) {
    showToast('Failed to start Live Share: ' + e.message, 3000);
  }
}

async function stopLiveShare() {
  if (state.liveShare.syncInterval) clearInterval(state.liveShare.syncInterval);
  state.liveShare.active = false;
  state.liveShare.binId = null;
  state.liveShare.syncInterval = null;
  state.liveShare.shareUrl = null;
  showToast('Live Share stopped (link still works — Resume anytime)');
}

async function clearLiveShare() {
  await stopLiveShare();
  await clearBinId();
  showToast('Live Share cleared — next time will create new link');
}

async function viewShareLink() {
  const savedBinId = await getSavedBinId();
  if (!savedBinId) {
    showToast('No active Live Share link');
    return;
  }
  const shareUrl = window.location.origin + window.location.pathname + '?watch=' + savedBinId;
  state.modal = { type: 'share-link', payload: shareUrl };
  render();
}

async function startWatchMode(binId) {
  state.watchMode = { binId };
  const apiKey = await getJsonBinKey();
  const headers = apiKey ? { 'X-Master-Key': apiKey } : {};

  async function fetchData() {
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, { headers });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const client = json.record.data;
      state.current = client;
      state.currentId = client.id;
      state.view = 'workflow';
      render();
    } catch (e) {
      console.error('Watch fetch failed:', e);
    }
  }

  await fetchData();
  state.watchMode.fetchInterval = setInterval(fetchData, 10000);
}

// ==============================================================
// CLIENT OPS
// ==============================================================
function newClientObject(name) {
  const id = 'c_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  const now = new Date().toISOString();
  return { id, name, createdAt: now, updatedAt: now, answers: {}, timestamps: {}, notes: {} };
}

async function createClient(name) {
  if (!name || !name.trim()) return;
  const client = newClientObject(name.trim());
  await saveClient(client);
  state.index = [...state.index, { id: client.id, name: client.name, createdAt: client.createdAt, updatedAt: client.updatedAt }];
  await saveIndex(state.index);
  await switchClient(client.id);
  showToast(`Client "${client.name}" added`);
}

async function renameClient(id, newName) {
  if (!newName || !newName.trim()) return;
  const client = id === state.currentId ? state.current : await loadClient(id);
  if (!client) return;
  client.name = newName.trim();
  client.updatedAt = new Date().toISOString();
  await saveClient(client);
  if (id === state.currentId) state.current = client;
  state.index = state.index.map(c => c.id === id ? { ...c, name: client.name, updatedAt: client.updatedAt } : c);
  await saveIndex(state.index);
  showToast('Renamed');
}

async function deleteClient(id) {
  await deleteClientFromStorage(id);
  state.index = state.index.filter(c => c.id !== id);
  await saveIndex(state.index);
  if (id === state.currentId) {
    if (state.index.length > 0) await switchClient(state.index[0].id);
    else { state.currentId = null; state.current = null; state.view = 'empty'; }
  }
  showToast('Client deleted');
}

async function switchClient(id) {
  const client = await loadClient(id);
  if (!client) {
    state.index = state.index.filter(c => c.id !== id);
    await saveIndex(state.index);
    if (state.index.length > 0) return switchClient(state.index[0].id);
    state.view = 'empty';
    render();
    return;
  }
  state.currentId = id;
  state.current = client;
  state.flash = null;
  state.expandedNote = null;
  state.view = 'workflow';
  render();
}

async function resetCurrent() {
  if (!state.current) return;
  state.current.answers = {};
  state.current.timestamps = {};
  state.current.notes = {};
  state.current.updatedAt = new Date().toISOString();
  state.flash = null;
  await saveClient(state.current);
  await refreshIndexFor(state.current);
  showToast('Workflow reset');
}

async function refreshIndexFor(client) {
  state.index = state.index.map(c => c.id === client.id ? { ...c, name: client.name, updatedAt: client.updatedAt } : c);
  await saveIndex(state.index);
}

// ==============================================================
// WORKFLOW LOGIC
// ==============================================================
function pruneInactive(client) {
  STEPS.forEach(s => {
    if (client.answers[s.id] !== undefined && !s.isActive(client.answers)) {
      delete client.answers[s.id];
      delete client.timestamps[s.id];
    }
  });
}

async function setAnswer(stepId, val) {
  if (!state.current || state.watchMode) return;
  state.current.answers[stepId] = val;
  state.current.timestamps[stepId] = new Date().toISOString();
  state.flash = null;

  if (stepId === "1.4" && val === "No") {
    delete state.current.answers["1.3"];
    delete state.current.answers["1.4"];
    delete state.current.timestamps["1.3"];
    delete state.current.timestamps["1.4"];
    state.flash = "Documents were not approved by TikTok. Step 1.3 has been reset — resubmit corrected documents, then re-verify approval on step 1.4.";
  }

  pruneInactive(state.current);
  state.current.updatedAt = new Date().toISOString();
  await saveClient(state.current);
  await refreshIndexFor(state.current);
  render();
}

async function editStep(stepId) {
  if (!state.current || state.watchMode) return;
  delete state.current.answers[stepId];
  delete state.current.timestamps[stepId];
  state.flash = null;
  pruneInactive(state.current);
  state.current.updatedAt = new Date().toISOString();
  await saveClient(state.current);
  await refreshIndexFor(state.current);
  render();
}

async function saveNote(stepId, text) {
  if (!state.current || state.watchMode) return;
  if (text && text.trim()) state.current.notes[stepId] = text.trim();
  else delete state.current.notes[stepId];
  state.current.updatedAt = new Date().toISOString();
  state.expandedNote = null;
  await saveClient(state.current);
  await refreshIndexFor(state.current);
  showToast(text && text.trim() ? 'Note saved' : 'Note removed');
}

function getCurrentStep() {
  if (!state.current) return null;
  return STEPS.find(s => s.isActive(state.current.answers) && !isResolved(state.current.answers[s.id]));
}
function getCompleted() {
  if (!state.current) return [];
  return STEPS.filter(s => s.isActive(state.current.answers) && isResolved(state.current.answers[s.id]));
}
function getActiveCount() {
  if (!state.current) return 0;
  return STEPS.filter(s => s.isActive(state.current.answers)).length;
}
function isAllComplete() {
  if (!state.current) return false;
  const a = state.current.answers;
  if (!isDone(a["6.4"])) return false;
  for (const s of STEPS) {
    if (s.isActive(a)) {
      const v = a[s.id];
      if (v === undefined || v === "In Progress" || v === "Blocked") return false;
    }
  }
  return true;
}
function getPhaseProgress(client, p) {
  const a = client.answers;
  const active = STEPS.filter(s => s.phase === p && s.isActive(a));
  const resolved = active.filter(s => isResolved(a[s.id]));
  return { done: resolved.length, total: active.length, pct: active.length === 0 ? 0 : Math.round((resolved.length / active.length) * 100) };
}
function getOverallPct(client) {
  const a = client.answers;
  const active = STEPS.filter(s => s.isActive(a));
  const resolved = active.filter(s => isResolved(a[s.id]));
  return active.length === 0 ? 0 : Math.round((resolved.length / active.length) * 100);
}
function isPhaseUnlocked(p) {
  if (!state.current) return false;
  return STEPS.some(s => s.phase === p && s.isActive(state.current.answers));
}

// ==============================================================
// EXPORT / IMPORT
// ==============================================================
async function exportAllData() {
  const data = { version: 1, exportedAt: new Date().toISOString(), clients: [] };
  for (const meta of state.index) {
    const client = await loadClient(meta.id);
    if (client) data.clients.push(client);
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const stamp = new Date().toISOString().slice(0, 10);
  a.download = `tiktok-shop-manager-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`Backup of ${data.clients.length} clients downloaded`);
}

async function importAllData(file) {
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.clients || !Array.isArray(data.clients)) throw new Error('Invalid file — no clients array');
    let added = 0, updated = 0;
    for (const c of data.clients) {
      if (!c.id || !c.name) continue;
      const clean = {
        id: c.id, name: c.name,
        createdAt: c.createdAt || new Date().toISOString(),
        updatedAt: c.updatedAt || new Date().toISOString(),
        answers: c.answers || {}, timestamps: c.timestamps || {}, notes: c.notes || {}
      };
      const existing = state.index.find(x => x.id === c.id);
      await saveClient(clean);
      if (existing) {
        updated++;
        state.index = state.index.map(x => x.id === c.id ? { id: c.id, name: clean.name, createdAt: clean.createdAt, updatedAt: clean.updatedAt } : x);
      } else {
        added++;
        state.index.push({ id: c.id, name: clean.name, createdAt: clean.createdAt, updatedAt: clean.updatedAt });
      }
    }
    await saveIndex(state.index);
    showToast(`Imported: ${added} new, ${updated} updated`, 2500);
    if (!state.currentId && state.index.length > 0) {
      await switchClient(state.index[0].id);
    } else {
      render();
    }
  } catch (e) {
    showToast('Import failed: ' + e.message, 3500);
  }
}

// ==============================================================
// UTILS
// ==============================================================
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function pillClass(v) {
  const m = {"Done":"pill-done","Yes":"pill-yes","No":"pill-no","In Progress":"pill-progress","Blocked":"pill-blocked","N/A":"pill-na","Manual":"pill-method","Shopify":"pill-method"};
  return "pill " + (m[v] || "pill-na");
}
function getButtons(type) {
  if (type === "yesno") return ["Yes", "No"];
  if (type === "method") return ["Manual", "Shopify"];
  return ["In Progress", "Done", "Blocked", "N/A"];
}
function fmtRelTime(iso) {
  if (!iso) return '';
  const then = new Date(iso).getTime();
  const now = Date.now();
  const diff = Math.max(0, now - then);
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return 'just now';
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  if (day < 30) return `${day}d ago`;
  const mo = Math.floor(day / 30);
  if (mo < 12) return `${mo}mo ago`;
  return new Date(iso).toLocaleDateString();
}
function fmtFullDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
}

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => {});
  } else {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('Copied!');
  }
}

// ==============================================================
// RENDER
// ==============================================================
function render() {
  const root = document.getElementById('root');
  let html = '<div class="app">';
  html += renderHeader();
  html += renderStorageBadge();
  if (state.watchMode) html += renderWatchBanner();
  if (state.liveShare.active && !state.watchMode) html += renderLiveBanner();

  if (state.view === 'loading') {
    html += `<div class="loading-state"><div class="spinner"></div><div>Loading…</div></div>`;
  } else if (state.view === 'empty') {
    html += renderEmpty();
  } else if (state.view === 'manage') {
    html += renderManage();
  } else if (state.view === 'workflow') {
    if (!state.watchMode) html += renderClientBar();
    html += renderWorkflow();
  }

  if (state.toast) html += renderToast();
  if (state.modal) html += renderModal();

  html += '</div>';
  root.innerHTML = html;
  attachModalHandlers();
}

function renderHeader() {
  const showManage = state.view === 'workflow' || state.view === 'manage' || state.view === 'empty';
  const showLiveShare = state.view === 'workflow' && state.current && !state.watchMode;
  let actions = '';
  if (showManage && state.view === 'manage') {
    actions = `<button onclick="goWorkflow()">${icon('arrow-left')} Back</button>`;
  } else if (showManage && state.index.length > 0) {
    actions = `<button onclick="goManage()">${icon('settings')} Manage</button>`;
  }
  if (showLiveShare) {
    if (state.liveShare.active) {
      actions += `<button class="success" onclick="stopLiveShare()">${icon('radio')} Stop</button>`;
      actions += `<button onclick="viewShareLink()">${icon('link')} View Link</button>`;
    } else {
      actions += `<button onclick="startLiveShare()">${icon('share')} Live Share</button>`;
    }
  }
  return `
    <div class="app-header">
      <div class="brand-row">
        <div class="brand-icon">${icon('list-check')}</div>
        <div class="brand-text">
          <div class="brand-title">TikTok Shop Manager</div>
          <div class="brand-sub">Setup workflow tracker</div>
        </div>
      </div>
      <div class="header-actions">${actions}</div>
    </div>
  `;
}

function renderStorageBadge() {
  if (state.watchMode) return '';
  if (STORAGE_MODE === 'memory') {
    return `<div class="storage-badge warn">${icon('alert-triangle')} Memory only — data lost on refresh. Use Export to back up.</div>`;
  }
  if (STORAGE_MODE === 'local') {
    return `<div class="storage-badge">${icon('hard-drive')} Saved to this browser · persists across refreshes</div>`;
  }
  return `<div class="storage-badge">${icon('cloud')} Saved to Claude · persists across sessions</div>`;
}

function renderWatchBanner() {
  return `
    <div class="watch-banner">
      ${icon('eye')}
      <div class="watch-banner-text">
        <div class="watch-banner-title">Viewing live share — read-only mode</div>
        <div class="watch-banner-sub">This view updates automatically every 10 seconds. You cannot edit steps.</div>
      </div>
    </div>
  `;
}

function renderLiveBanner() {
  return `
    <div class="live-banner">
      ${icon('radio')}
      <div class="live-banner-text">
        <div class="live-banner-title">Live Share active — syncing every 5 seconds</div>
        <div class="live-banner-sub">Client can watch updates at your shared link. Click "Stop" to pause sync (link stays active).</div>
      </div>
      <div class="live-banner-actions">
        <button class="subtle" onclick="clearLiveShare()" title="Clear saved link and create new one next time">${icon('trash')}</button>
      </div>
    </div>
  `;
}

function renderEmpty() {
  return `
    <div class="welcome">
      <div class="welcome-icon-wrap">${icon('users')}</div>
      <div class="welcome-title">Welcome — add your first client</div>
      <div class="welcome-sub">
        Track TikTok Shop setup workflow for each client. Progress, timestamps, and notes save automatically and survive page refreshes.
      </div>
      <div class="welcome-actions">
        <button class="primary" onclick="openAddClient()">${icon('plus')} Add client</button>
        <button onclick="triggerImport()">${icon('upload')} Import backup</button>
      </div>
    </div>
  `;
}

function renderClientBar() {
  const options = state.index.map(c =>
    `<option value="${esc(c.id)}" ${c.id === state.currentId ? 'selected' : ''}>${esc(c.name)}</option>`
  ).join('');
  return `
    <div class="client-bar">
      <span class="client-bar-label">ACTIVE CLIENT</span>
      <select onchange="switchClient(this.value)">${options}</select>
      <div class="client-bar-actions">
        <button onclick="openAddClient()">${icon('plus')} Add</button>
        <button onclick="openRenameClient()" title="Rename">${icon('edit')}</button>
      </div>
    </div>
  `;
}

function renderWorkflow() {
  if (!state.current) return '';
  const c = state.current;
  const current = getCurrentStep();
  const completed = getCompleted();
  const totalActive = getActiveCount();
  const pct = getOverallPct(c);
  const allDone = isAllComplete();
  const isReadOnly = !!state.watchMode;

  let html = `<div class="workflow">`;
  html += `
    <div class="progress-row">
      <span><span class="progress-text-main">${esc(c.name)}</span> · <span class="mono">${completed.length}/${totalActive}</span> steps resolved</span>
      <span class="mono">${pct}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  `;

  if (state.flash) {
    html += `
      <div class="flash">
        ${icon('alert-circle')}
        <div class="flash-content">${esc(state.flash)}</div>
        <button class="flash-close" onclick="dismissFlash()" aria-label="Dismiss">${icon('x')}</button>
      </div>
    `;
  }

  if (current) {
    html += renderNextCard(current, isReadOnly);
  } else if (allDone) {
    html += `
      <div class="complete-card">
        <div class="complete-icon">${icon('circle-check')}</div>
        <div class="complete-title">All setup complete</div>
        <div class="complete-sub">${esc(c.name)} is ready to begin outreach</div>
      </div>
    `;
  }

  if (completed.length > 0) {
    html += `<div class="section-title">Completed steps <span class="count">${completed.length}</span></div>`;
    html += `<div class="completed-list">`;
    completed.forEach(s => html += renderCompletedRow(s, isReadOnly));
    html += `</div>`;
  }

  html += `<div class="section-title">Progress by phase</div>`;
  html += `<div class="phase-grid">`;
  PHASES.forEach(p => html += renderPhaseCard(p));
  html += `</div>`;

  if (!isReadOnly) {
    html += `<div style="margin-top:24px; display:flex; justify-content:flex-end;">
      <button class="ghost" onclick="confirmReset()">${icon('refresh')} Reset workflow</button>
    </div>`;
  }

  html += `</div>`;
  return html;
}

function renderNextCard(step, isReadOnly) {
  const c = state.current;
  const status = c.answers[step.id];
  const isInProgress = status === "In Progress";
  const isBlockedState = status === "Blocked";
  const labelText = status ? "CURRENT STEP" : "NEXT ACTION";
  const phaseIcon = PHASES.find(p => p.n === step.phase).icon;

  let cls = `next-card phase-${step.phase}`;
  if (isInProgress) cls += " in-progress";
  if (isBlockedState) cls += " blocked";

  const buttons = isReadOnly ? '' : getButtons(step.type).map(b =>
    `<button onclick="setAnswer('${step.id}','${b}')">${esc(b)}</button>`
  ).join('');

  let statusInline = '';
  if (status) statusInline = `<span class="status-inline ${pillClass(status).replace('pill ','')}">${esc(status)}</span>`;

  let banner = '';
  if (!isReadOnly) {
    if (isInProgress) {
      banner = `<div class="banner-inline">${icon('clock')}<div>Complete this step first to move forward. Mark as <strong>Done</strong> when finished, or <strong>N/A</strong> to skip.</div></div>`;
    } else if (isBlockedState) {
      banner = `<div class="banner-inline">${icon('alert-triangle')}<div>This step is blocked. Resolve the issue and mark <strong>Done</strong>, or mark <strong>N/A</strong> to skip and continue.</div></div>`;
    }
  }

  return `
    <div class="${cls}">
      <div class="next-label">${icon(phaseIcon)} ${labelText}${statusInline}</div>
      <div class="next-step-id mono">Step ${esc(step.id)} · Phase ${step.phase}: ${esc(step.phaseName)}</div>
      <div class="next-task">${esc(step.task)}</div>
      ${isReadOnly ? '<div style="color:var(--ink-mute);font-size:13px;margin-top:8px;">(Read-only mode)</div>' : `<div class="button-row">${buttons}</div>${banner}`}
    </div>
  `;
}

function renderCompletedRow(step, isReadOnly) {
  const c = state.current;
  const val = c.answers[step.id];
  const ts = c.timestamps[step.id];
  const note = c.notes[step.id];
  const isEditing = state.expandedNote === step.id;
  const hasNote = !!note;

  let html = `<div class="completed-row${hasNote ? ' has-note' : ''}">`;
  html += `<div class="completed-row-main">`;
  html += `<div class="phase-tag phase-${step.phase}"></div>`;
  html += `<span class="step-id">${esc(step.id)}</span>`;
  html += `<span class="step-text">${esc(step.task)}</span>`;
  html += `<span class="${pillClass(val)}">${esc(val)}</span>`;
  if (ts) html += `<span class="step-ts" title="${esc(fmtFullDate(ts))}">${esc(fmtRelTime(ts))}</span>`;
  if (!isReadOnly) {
    html += `<div class="row-actions">`;
    html += `<button class="icon-btn${hasNote ? ' active' : ''}" onclick="toggleNote('${step.id}')" title="${hasNote ? 'Edit note' : 'Add note'}">${icon('note')}</button>`;
    html += `<button class="icon-btn" onclick="editStep('${step.id}')" title="Change answer">${icon('edit')}</button>`;
    html += `</div>`;
  }
  html += `</div>`;

  if (!isReadOnly && isEditing) {
    html += `<div class="note-area"><div class="note-editor">
      <textarea id="note-input-${esc(step.id)}" placeholder="Add a note for this step (errors, IDs, details, anything to remember)…">${esc(note || '')}</textarea>
      <div class="note-actions">
        <button onclick="cancelNote()">${icon('x')} Cancel</button>
        <button class="primary" onclick="commitNote('${step.id}')">${icon('check')} Save note</button>
      </div>
    </div></div>`;
  } else if (hasNote) {
    html += `<div class="note-area"><div class="note-display">${icon('note')}<span>${esc(note)}</span></div></div>`;
  }

  html += `</div>`;
  return html;
}

function renderPhaseCard(p) {
  if (!state.current) return '';
  const unlocked = isPhaseUnlocked(p.n);
  const prog = unlocked ? getPhaseProgress(state.current, p.n) : { done: 0, total: 0, pct: 0 };
  let cls = `phase-card${unlocked ? ' phase-' + p.n : ' locked'}`;
  return `
    <div class="${cls}">
      <div class="phase-card-head">
        ${icon(p.icon)}
        <span>${p.n}. ${esc(p.name)}</span>
      </div>
      ${unlocked
        ? `<div class="phase-card-pct">${prog.pct}%</div>
           <div class="phase-card-count">${prog.done} of ${prog.total} steps</div>
           <div class="phase-card-bar"><div class="phase-card-bar-fill" style="width:${prog.pct}%"></div></div>`
        : `<div class="phase-card-pct" style="color:var(--ink-mute); font-size:20px;">${icon('lock')}</div>
           <div class="phase-card-count">Locked</div>
           <div class="phase-card-bar"><div class="phase-card-bar-fill" style="width:0%"></div></div>`
      }
    </div>
  `;
}

function renderManage() {
  const items = state.index.map(c => {
    return `
      <div class="client-item">
        <div class="client-item-info">
          <div class="client-item-name">${esc(c.name)}</div>
          <div class="client-item-meta">
            <span>Created ${esc(fmtRelTime(c.createdAt))}</span>
            <span>·</span>
            <span>Last updated ${esc(fmtRelTime(c.updatedAt))}</span>
          </div>
        </div>
        <div class="client-item-actions">
          <button onclick="switchAndGo('${c.id}')">${icon('arrow-right')} Open</button>
          <button onclick="openRenameClientFor('${c.id}')">${icon('edit')} Rename</button>
          <button class="danger" onclick="confirmDelete('${c.id}')">${icon('trash')} Delete</button>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="manage-view">
      <div class="manage-header">
        <div class="manage-title">All clients (${state.index.length})</div>
        <div class="manage-actions">
          <button class="primary" onclick="openAddClient()">${icon('plus')} Add client</button>
        </div>
      </div>

      <div class="backup-row">
        ${icon('database')}
        <div class="backup-info">
          <div class="backup-title">Backup and restore</div>
          <div class="backup-sub">Export all clients to a JSON file. Import it later — even on another device.</div>
        </div>
        <div class="backup-actions">
          <button onclick="exportAllData()" ${state.index.length === 0 ? 'disabled' : ''}>${icon('download')} Export</button>
          <button onclick="triggerImport()">${icon('upload')} Import</button>
        </div>
      </div>

      ${state.index.length === 0
        ? `<div class="empty-state">No clients yet. Click "Add client" to create your first one, or "Import" to restore from a backup.</div>`
        : `<div class="client-list">${items}</div>`
      }
    </div>
  `;
}

function renderToast() {
  return `<div class="toast">${icon('check')} ${esc(state.toast)}</div>`;
}

function renderModal() {
  const m = state.modal;
  if (m.type === 'add') {
    return `
      <div class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">Add new client</div>
          <div class="modal-sub">Give this client a recognizable name (e.g. shop name or brand).</div>
          <input type="text" id="modal-input" placeholder="e.g. INMI Seoul" autofocus>
          <div class="modal-actions">
            <button onclick="closeModal()">Cancel</button>
            <button class="primary" onclick="submitAddClient()">${icon('plus')} Create client</button>
          </div>
        </div>
      </div>
    `;
  }
  if (m.type === 'rename') {
    const target = state.index.find(c => c.id === m.payload);
    return `
      <div class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">Rename client</div>
          <div class="modal-sub">Currently: ${esc(target ? target.name : '')}</div>
          <input type="text" id="modal-input" value="${esc(target ? target.name : '')}" autofocus>
          <div class="modal-actions">
            <button onclick="closeModal()">Cancel</button>
            <button class="primary" onclick="submitRename('${m.payload}')">${icon('check')} Save</button>
          </div>
        </div>
      </div>
    `;
  }
  if (m.type === 'delete') {
    const target = state.index.find(c => c.id === m.payload);
    return `
      <div class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">Delete this client?</div>
          <div class="modal-sub">All workflow progress, timestamps, and notes for <strong>${esc(target ? target.name : '')}</strong> will be permanently deleted. This cannot be undone.</div>
          <div class="modal-actions">
            <button onclick="closeModal()">Cancel</button>
            <button class="danger" onclick="submitDelete('${m.payload}')">${icon('trash')} Delete permanently</button>
          </div>
        </div>
      </div>
    `;
  }
  if (m.type === 'reset') {
    return `
      <div class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">Reset workflow?</div>
          <div class="modal-sub">All answers, timestamps, and notes for <strong>${esc(state.current ? state.current.name : '')}</strong> will be cleared. The client itself stays.</div>
          <div class="modal-actions">
            <button onclick="closeModal()">Cancel</button>
            <button class="danger" onclick="submitReset()">${icon('refresh')} Reset workflow</button>
          </div>
        </div>
      </div>
    `;
  }
  if (m.type === 'setup-jsonbin') {
    return `
      <div class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">Setup Live Share (one-time)</div>
          <div class="modal-sub">To enable real-time sharing, you need a free JSONBin.io API key. Takes 2 minutes:</div>
          <ol class="modal-steps">
            <li>Go to <strong>jsonbin.io</strong> and create a free account (no credit card needed)</li>
            <li>Copy your API key from the dashboard (looks like: <code>$2a$10$...</code>)</li>
            <li>Paste it below and save. You'll only need to do this once.</li>
          </ol>
          <div class="modal-field">
            <label>JSONBin.io API Key</label>
            <input type="text" id="jsonbin-key-input" placeholder="$2a$10$..." autofocus>
          </div>
          <div class="modal-actions">
            <button onclick="closeModal()">Cancel</button>
            <button class="primary" onclick="submitJsonBinKey()">${icon('check')} Save and continue</button>
          </div>
        </div>
      </div>
    `;
  }
  if (m.type === 'share-link') {
    const url = m.payload;
    return `
      <div class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">Share this link ${icon('radio')}</div>
          <div class="modal-sub">Send this link to your client. They'll see live updates as you work (10-15 second delay). Read-only for them. <strong>This link is saved</strong> — you can reuse it even after closing the tab.</div>
          <div class="modal-code" onclick="copyToClipboard('${esc(url)}')" title="Click to copy">${esc(url)}</div>
          <div class="modal-actions">
            <button onclick="closeModal()">${icon('check')} Done</button>
            <button onclick="copyToClipboard('${esc(url)}')">${icon('copy')} Copy link</button>
          </div>
        </div>
      </div>
    `;
  }
  return '';
}

function attachModalHandlers() {
  const input = document.getElementById('modal-input');
  if (input) {
    input.focus();
    input.select();
    input.onkeydown = (e) => {
      if (e.key === 'Enter') {
        if (state.modal.type === 'add') submitAddClient();
        else if (state.modal.type === 'rename') submitRename(state.modal.payload);
      } else if (e.key === 'Escape') {
        closeModal();
      }
    };
  }
  const keyInput = document.getElementById('jsonbin-key-input');
  if (keyInput) {
    keyInput.focus();
    keyInput.onkeydown = (e) => {
      if (e.key === 'Enter') submitJsonBinKey();
      else if (e.key === 'Escape') closeModal();
    };
  }
}

// ==============================================================
// EVENT HANDLERS
// ==============================================================
window.setAnswer = setAnswer;
window.editStep = editStep;
window.switchClient = switchClient;
window.goManage = () => { state.view = 'manage'; state.flash = null; render(); };
window.goWorkflow = () => { if (state.current) { state.view = 'workflow'; render(); } else { state.view = 'empty'; render(); } };
window.switchAndGo = async (id) => { await switchClient(id); };

window.openAddClient = () => { state.modal = { type: 'add' }; render(); };
window.openRenameClient = () => { if (state.currentId) { state.modal = { type: 'rename', payload: state.currentId }; render(); } };
window.openRenameClientFor = (id) => { state.modal = { type: 'rename', payload: id }; render(); };
window.confirmDelete = (id) => { state.modal = { type: 'delete', payload: id }; render(); };
window.confirmReset = () => { state.modal = { type: 'reset' }; render(); };

window.closeModal = (e) => {
  if (e && e.currentTarget && e.target !== e.currentTarget) return;
  state.modal = null; render();
};
window.submitAddClient = async () => {
  const inp = document.getElementById('modal-input');
  const name = inp ? inp.value : '';
  if (!name.trim()) return;
  state.modal = null;
  await createClient(name);
};
window.submitRename = async (id) => {
  const inp = document.getElementById('modal-input');
  const name = inp ? inp.value : '';
  if (!name.trim()) return;
  state.modal = null;
  await renameClient(id, name);
  render();
};
window.submitDelete = async (id) => { state.modal = null; await deleteClient(id); render(); };
window.submitReset = async () => { state.modal = null; await resetCurrent(); render(); };

window.dismissFlash = () => { state.flash = null; render(); };

window.toggleNote = (stepId) => {
  state.expandedNote = state.expandedNote === stepId ? null : stepId;
  render();
};
window.cancelNote = () => { state.expandedNote = null; render(); };
window.commitNote = (stepId) => {
  const inp = document.getElementById('note-input-' + stepId);
  if (!inp) return;
  saveNote(stepId, inp.value);
};

window.exportAllData = exportAllData;
window.triggerImport = () => { document.getElementById('import-file-input').click(); };

window.startLiveShare = startLiveShare;
window.stopLiveShare = stopLiveShare;
window.clearLiveShare = clearLiveShare;
window.viewShareLink = viewShareLink;
window.copyToClipboard = copyToClipboard;

window.submitJsonBinKey = async () => {
  const inp = document.getElementById('jsonbin-key-input');
  const key = inp ? inp.value.trim() : '';
  if (!key) return;
  await setJsonBinKey(key);
  state.modal = null;
  showToast('API key saved');
  startLiveShare();
};

document.getElementById('import-file-input').addEventListener('change', async (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) await importAllData(f);
  e.target.value = '';
});

// ==============================================================
// INIT
// ==============================================================
async function init() {
  if (watchBinId) {
    await startWatchMode(watchBinId);
    return;
  }

  state.index = await loadIndex();
  if (state.index.length === 0) {
    state.view = 'empty';
    render();
    return;
  }
  const sorted = [...state.index].sort((a,b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
  await switchClient(sorted[0].id);
}

init().catch(err => {
  console.error('Init error:', err);
  document.getElementById('root').innerHTML = `<div class="app"><div class="welcome"><div class="welcome-icon-wrap">${icon('alert-circle')}</div><div class="welcome-title">Couldn't load</div><div class="welcome-sub">${esc(String(err))}</div></div></div>`;
});
</script>
</body>
</html>
